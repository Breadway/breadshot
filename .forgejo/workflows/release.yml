name: release

on:
  push:
    tags: ["v*"]

jobs:
  build:
    runs-on: [self-hosted, hestia]
    steps:
      - name: checkout
        run: |
          set -euo pipefail
          rm -rf src && mkdir src
          git clone --branch "${GITHUB_REF_NAME}" --depth 1 \
            "https://git.breadway.dev/${GITHUB_REPOSITORY}.git" src

      - name: build
        run: cd src && cargo build --release --locked

      - name: prepare artifacts
        run: |
          set -euo pipefail
          VERSION="${GITHUB_REF_NAME#v}"
          PKG_DIR="/srv/breadway-dl/breadshot/${VERSION}"
          mkdir -p "${PKG_DIR}"
          cp "src/target/release/breadshot" "${PKG_DIR}/breadshot-x86_64"
          strip "${PKG_DIR}/breadshot-x86_64"
          sha256sum "${PKG_DIR}/breadshot-x86_64" | awk '{print $1}' \
            > "${PKG_DIR}/breadshot-x86_64.sha256"
          cp src/bakery.toml "${PKG_DIR}/bakery.toml"
          ln -sfn "${VERSION}" "/srv/breadway-dl/breadshot/latest"

      - name: regenerate index.json
        run: |
          set -euo pipefail
          rm -rf /tmp/bread-ecosystem-ci
          git clone https://git.breadway.dev/Breadway/bread-ecosystem.git /tmp/bread-ecosystem-ci
          bash /tmp/bread-ecosystem-ci/scripts/gen-index.sh

      - name: upload to GitHub Release
        env:
          GH_TOKEN: ${{ secrets.GH_RELEASE_TOKEN }}
        run: |
          set -euo pipefail
          VERSION="${GITHUB_REF_NAME#v}"
          PKG_DIR="/srv/breadway-dl/breadshot/${VERSION}"
          gh release create "${GITHUB_REF_NAME}" --repo Breadway/breadshot \
            --title "breadshot v${VERSION}" --generate-notes 2>/dev/null || true
          gh release upload "${GITHUB_REF_NAME}" --repo Breadway/breadshot \
            "${PKG_DIR}/breadshot-x86_64" \
            "${PKG_DIR}/breadshot-x86_64.sha256" \
            --clobber
