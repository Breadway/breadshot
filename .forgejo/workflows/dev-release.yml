name: dev release

# Publishes a dev-track build on every push to `dev` —
# separate from release.yml's tag-triggered stable releases. See
# bread-ecosystem's docs/release-channels.md for the three-track policy
# this is part of.
on:
  push:
    branches: ['dev']

jobs:
  build:
    runs-on: [self-hosted, hestia]
    steps:
      - name: checkout
        run: |
          set -euo pipefail
          rm -rf src && mkdir src
          git clone --branch dev --depth 1 \
            "https://git.breadway.dev/${GITHUB_REPOSITORY}.git" src

      - name: build
        run: cd src && cargo build --release --locked

      - name: compute dev version
        run: |
          set -euo pipefail
          cd src
          CUR="$(grep -m1 '^version' Cargo.toml | sed -E 's/.*"(.*)".*/\1/')"
          IFS='.' read -r MA MI PA <<< "${CUR}"
          SHA="$(git rev-parse --short HEAD)"
          TS="$(date -u +%Y%m%d%H%M%S)"
          echo "VERSION=${MA}.${MI}.$((PA + 1))-dev.${TS}+${SHA}" >> "$GITHUB_ENV"

      - name: prepare artifacts
        run: |
          set -euo pipefail
          PKG_DIR="/srv/breadway-dl/dev/breadshot/${VERSION}"
          mkdir -p "${PKG_DIR}"
          cp "src/target/release/breadshot" "${PKG_DIR}/breadshot-x86_64"
          strip "${PKG_DIR}/breadshot-x86_64"
          sha256sum "${PKG_DIR}/breadshot-x86_64" | awk '{print $1}' \
            > "${PKG_DIR}/breadshot-x86_64.sha256"
          cp src/bakery.toml "${PKG_DIR}/bakery.toml"
          ln -sfn "${VERSION}" "/srv/breadway-dl/dev/breadshot/latest"

      # No GitHub Release upload — dev, like the other non-stable track,
      # is only distributed via dl.breadway.dev/dev/.
      - name: regenerate dev index.json
        env:
          MINISIGN_SEC_KEY: ${{ secrets.BAKERY_MINISIGN_SEC_KEY_PATH }}
        run: |
          set -euo pipefail
          if [ -z "${MINISIGN_SEC_KEY:-}" ]; then
            echo "::error::BAKERY_MINISIGN_SEC_KEY_PATH secret not set — refusing to regenerate dev index.json unsigned (would leave a stale signature mismatched against fresh content and break bakery for everyone on the dev track)"
            exit 1
          fi
          rm -rf /tmp/bread-ecosystem-ci
          # --branch dev: the TRACK-aware gen-index.sh isn't merged to
          # bread-ecosystem's main yet.
          git clone --branch dev https://git.breadway.dev/Breadway/bread-ecosystem.git /tmp/bread-ecosystem-ci
          TRACK=dev bash /tmp/bread-ecosystem-ci/scripts/gen-index.sh
